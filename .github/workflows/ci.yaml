name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0

      - name: Format Rust code
        run: devbox run -- cargo fmt --all -- --check

      - name: Lint Rust code
        run: devbox run -- cargo clippy --workspace -- -D warnings

      - name: Run Rust tests
        run: devbox run -- cargo test --workspace --all-features

      - name: Check Rust dependencies for security vulnerabilities
        run: devbox run -- cargo deny check bans licenses sources
